# PyDSAI Continuous Integration Workflow
# PyDSAI 継続的インテグレーション ワークフロー
#
# Runs on: push, pull_request to main/master
# 実行タイミング: main/master への push, pull_request
#
# Jobs:
#   - test: pytest (Python 3.11, 3.12) / 単体テスト
#   - lint: Black format check + mypy strict / フォーマット・型チェック

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        run: |
          python -m pytest tests/ -v --tb=short

  lint:
    name: Black & Mypy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .  # 显式指定为仓库根目录，避免路径歧义

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Normalize line endings (CRLF → LF)
        run: find . -name "*.py" -exec sed -i 's/\r$//' {} \;

      - name: Run Black check
        run: black src tests --check

      - name: Run mypy
        run: mypy src/pydsai/ --strict